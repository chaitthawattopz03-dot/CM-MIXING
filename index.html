<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แดชบอร์ดงานซ่อมบำรุง · IW28 / IW38</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#2b5cc4;
  --ink:#1d1d18;
  --bg:#f3f2ee;
  --card:#fff;
  --line:#e8e7e2;
  --line-soft:#f1f0ea;
  --muted:#74746d;
  --muted-2:#9a9a92;
  --green:#2e8b6f;
  --red:#c1443a;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
::selection{background:#cdd9f5;}
#app{padding:22px 26px 60px;}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.iwscroll::-webkit-scrollbar{height:8px;width:8px}
.iwscroll::-webkit-scrollbar-thumb{background:#d4d3cc;border-radius:8px}
@media print{.iw-noprint{display:none!important}}
button{font-family:inherit;}

/* ---------- upload screen ---------- */
.upload-wrap{max-width:760px;margin:6vh auto 0;}
.upload-head{text-align:center;margin-bottom:24px;}
.upload-title{font-size:25px;font-weight:700;letter-spacing:-.2px;}
.upload-sub{font-size:14px;color:var(--muted-2);margin-top:8px;}
.upload-box{background:var(--card);border:2px dashed #c7c6bd;border-radius:16px;padding:38px 32px;text-align:center;transition:border-color .2s,background .2s;}
.upload-box.drag-over{border-color:var(--accent);background:#f7f9fd;}
.upload-types{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.type-card{border:1px solid var(--line);border-radius:12px;padding:18px;background:#faf9f6;}
.type-tag{font-size:13px;font-weight:700;letter-spacing:.3px;}
.tag-blue{color:#2b5cc4;} .tag-green{color:#2e7d6b;}
.type-desc{font-size:12.5px;color:var(--muted-2);margin-top:5px;}
.upload-cta{font-size:14px;color:#44443f;font-weight:500;}
.upload-hint{font-size:12px;color:var(--muted-2);margin:6px 0 18px;}
.pick-btn{display:inline-block;background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:9px;cursor:pointer;}
.parsing-row{margin-top:18px;font-size:13px;color:var(--accent);display:flex;gap:9px;align-items:center;justify-content:center;}
.spinner{width:15px;height:15px;border:2px solid #c9d6f3;border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;}
.error-pill{margin-top:16px;font-size:12.5px;color:var(--red);background:#fcf0ee;border:1px solid #f1d2cd;border-radius:8px;padding:9px 12px;display:inline-block;}

/* ---------- dashboard shell ---------- */
.dash-wrap{max-width:1240px;margin:0 auto;animation:fadein .45s ease both;}
.dash-header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:18px;}
.dash-title{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.dash-meta{font-size:12.5px;color:#86867d;margin-top:5px;}
.header-actions{display:flex;gap:9px;align-items:center;}
.btn-ghost{font-size:12.5px;font-weight:600;color:#44443f;background:#fff;border:1px solid #ddddd5;border-radius:8px;padding:8px 14px;cursor:pointer;}
.btn-dark{font-size:12.5px;font-weight:600;color:#fff;background:var(--ink);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;}

.settings-panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin-bottom:14px;display:flex;gap:28px;flex-wrap:wrap;align-items:center;}
.settings-row{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:#44443f;}
.settings-row input[type=range]{width:180px;}
.swatches{display:flex;gap:8px;}
.swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.swatch-active{border-color:#1d1d18;}

.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.filter-label{font-size:12px;color:var(--muted-2);margin-right:3px;}
.chip{font-size:12px;font-weight:600;padding:6px 13px;border-radius:20px;cursor:pointer;background:#fff;color:#44443f;border:1px solid #ddddd5;}
.chip-active{background:var(--accent);color:#fff;border-color:var(--accent);}
.select-status{font-size:12px;font-weight:600;color:var(--ink);background:#fff;border:1px solid #ddddd5;border-radius:8px;padding:6px 10px;cursor:pointer;margin-left:6px;}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:14px;}
.kpi-card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:15px 16px 14px 19px;overflow:hidden;box-shadow:0 1px 2px rgba(20,20,15,.03);}
.kpi-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;}
.kpi-label{font-size:11.5px;color:var(--muted);font-weight:500;}
.kpi-value{font-size:26px;font-weight:700;margin-top:8px;font-variant-numeric:tabular-nums;line-height:1.04;}
.kpi-sub{font-size:11px;color:var(--muted-2);margin-top:5px;}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;box-shadow:0 1px 2px rgba(20,20,15,.03);margin-bottom:14px;}
.card h3{margin:0 0 14px;font-size:14.5px;font-weight:600;}
.card h3.tight{margin-bottom:4px;}
.card-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.card-head.wrap-head{flex-wrap:wrap;gap:12px;}
.card-head h3{margin:0;}
.hint{font-size:11px;color:var(--muted-2);}
.mb14{margin-bottom:14px;}
.legend{display:flex;gap:13px;font-size:11px;color:var(--muted);}
.legend span{display:flex;align-items:center;gap:5px;}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block;}

.row-2{display:grid;gap:13px;}
.row-pg-status{grid-template-columns:1.35fr 1fr;}
.row-aging-pa{grid-template-columns:1fr 1.35fr;}

.pg-bars{display:flex;flex-direction:column;gap:8px;}
.pg-bar-row{display:flex;align-items:center;gap:11px;background:transparent;border:none;border-radius:7px;padding:4px 6px;cursor:pointer;text-align:left;width:100%;}
.pg-bar-active{background:#eef2fb;}
.pg-label{width:42px;font-size:12.5px;font-weight:600;color:#33332d;flex-shrink:0;}
.pg-track{flex:1;height:20px;background:#f0efe9;border-radius:5px;position:relative;overflow:hidden;}
.pg-fill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;}
.pg-nums{font-size:12px;font-variant-numeric:tabular-nums;color:#55554e;width:78px;text-align:right;flex-shrink:0;}
.pg-nums b{color:var(--ink);}

.donut-row{display:flex;align-items:center;gap:18px;}
.donut{width:138px;height:138px;border-radius:50%;position:relative;flex-shrink:0;}
.donut-center{position:absolute;inset:25px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-num{font-size:22px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;}
.donut-cap{font-size:10.5px;color:var(--muted-2);margin-top:1px;}
.status-list{flex:1;display:flex;flex-direction:column;gap:9px;}
.status-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.status-tag{display:flex;align-items:center;gap:7px;font-size:12px;color:#44443f;}
.status-num{font-size:11.5px;font-variant-numeric:tabular-nums;color:#55554e;white-space:nowrap;}
.status-num b{color:var(--ink);}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block;flex-shrink:0;}

.bars-flex{display:flex;align-items:flex-end;gap:10px;}
.pa-flex{gap:14px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.bar-num{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.bar-track{width:100%;height:118px;display:flex;align-items:flex-end;}
.bar-fill{width:100%;border-radius:5px 5px 0 0;min-height:3px;}
.bar-label{font-size:10.5px;color:var(--muted);text-align:center;line-height:1.25;}
.pa-pair{height:120px;display:flex;align-items:flex-end;gap:4px;}
.pa-bar{width:15px;border-radius:4px 4px 0 0;min-height:3px;}
.pa-pg{font-size:11.5px;font-weight:600;color:#44443f;}
.pa-vals{font-size:9.5px;color:var(--muted-2);font-variant-numeric:tabular-nums;text-align:center;line-height:1.3;}

.month-scroll{display:flex;align-items:flex-end;gap:9px;overflow-x:auto;padding-bottom:4px;}
.month-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:42px;}
.month-pair{height:135px;display:flex;align-items:flex-end;gap:3px;}
.month-bar{width:11px;border-radius:3px 3px 0 0;min-height:2px;}
.month-label{font-size:10px;color:var(--muted);white-space:nowrap;}

.year-table{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1.1fr 1.1fr;gap:0;font-size:12.5px;}
.yt-head{font-size:11px;color:var(--muted-2);font-weight:600;padding:0 0 9px;}
.yt-head.right{text-align:right;}
.yt-cell{padding:10px 0;border-top:1px solid var(--line-soft);font-variant-numeric:tabular-nums;}
.yt-cell.right{text-align:right;}
.yt-year{font-weight:700;}

.table-tools{display:flex;align-items:center;gap:12px;}
.seg{display:flex;background:#f0efe9;border-radius:8px;padding:3px;}
.seg-btn{font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:#86867d;}
.seg-active{background:#fff;color:var(--ink);}
.table-scroll{overflow-x:auto;}
.data-table{display:grid;grid-template-columns:90px minmax(220px,1fr) 56px 130px 78px 70px 92px 92px;font-size:12px;min-width:820px;}
.dt-head{font-size:10.5px;color:var(--muted-2);font-weight:600;padding:0 8px 9px 0;}
.dt-head.right{text-align:right;padding:0 0 9px;}
.dt-cell{padding:8px 8px 8px 0;border-top:1px solid var(--line-soft);color:#55554e;}
.dt-cell.right{text-align:right;font-variant-numeric:tabular-nums;padding:8px 0;}
.dt-cell.mono{font-variant-numeric:tabular-nums;font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
.dt-cell.strong{font-weight:600;}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;}

@media (max-width:860px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .row-pg-status,.row-aging-pa{grid-template-columns:1fr;}
  .upload-types{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="./app.js"></script>
</body>
</html>
