<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แดชบอร์ดงานซ่อมบำรุง · IW28 / IW38</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#0e8f78;
  --ink:#141e1a;
  --bg:#f3f4ef;
  --card:#fff;
  --line:#e6eae4;
  --line-soft:#eef0ec;
  --muted:#5f6b64;
  --muted-2:#8a948d;
  --green:#0e8f78;
  --orange:#c07a3e;
  --red:#c1443a;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
::selection{background:#c9e8df;}
#app{padding:22px 26px 60px;}
button{font-family:inherit;}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.iwscroll::-webkit-scrollbar{height:8px;width:8px}
.iwscroll::-webkit-scrollbar-thumb{background:#cfd6d0;border-radius:8px}
@media print{.iw-noprint{display:none!important}}

/* ── upload screen ── */
.upload-wrap{max-width:760px;margin:6vh auto 0;}
.upload-head{text-align:center;margin-bottom:24px;}
.upload-title{font-family:'Space Grotesk','IBM Plex Sans Thai',sans-serif;font-size:27px;font-weight:700;letter-spacing:-.3px;}
.upload-sub{font-size:14px;color:var(--muted-2);margin-top:8px;}
.upload-box{background:var(--card);border:2px dashed #bcd6cd;border-radius:22px;padding:40px 32px;text-align:center;transition:border-color .2s,background .2s;}
.upload-box.drag-over{border-color:var(--accent);background:#f0faf7;}
.upload-types{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.type-card{border:1px solid var(--line);border-radius:16px;padding:18px;text-align:left;}
.tc-green{background:#f2f8f5;} .tc-orange{background:#faf6f0;}
.type-tag{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:.4px;}
.tag-green{color:#0e8f78;} .tag-orange{color:#c07a3e;}
.type-desc{font-size:12.5px;color:var(--muted-2);margin-top:5px;}
.upload-cta{font-size:14px;color:#33403a;font-weight:500;}
.upload-hint{font-size:12px;color:var(--muted-2);margin:6px 0 18px;}
.pick-btn{display:inline-block;background:#141e1a;color:#fff;font-size:13px;font-weight:600;padding:11px 22px;border-radius:11px;cursor:pointer;}
.parsing-row{margin-top:18px;font-size:13px;color:var(--accent);display:flex;gap:9px;align-items:center;justify-content:center;}
.spinner{width:15px;height:15px;border:2px solid #bfe4da;border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;}
.error-pill{margin-top:16px;font-size:12.5px;color:var(--red);background:#fcf0ee;border:1px solid #f1d2cd;border-radius:10px;padding:9px 12px;display:inline-block;}

/* ── dashboard shell ── */
.dash-wrap{max-width:1280px;margin:0 auto;animation:fadein .45s ease both;}
.dash-header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:18px;}
.dash-title{font-family:'Space Grotesk','IBM Plex Sans Thai',sans-serif;font-size:23px;font-weight:700;letter-spacing:-.3px;}
.dash-meta{font-size:12.5px;color:#7c877f;margin-top:5px;}
.header-actions{display:flex;gap:9px;align-items:center;}
.btn-ghost{font-size:12.5px;font-weight:600;color:#33403a;background:#fff;border:1px solid #d8ddd6;border-radius:9px;padding:8px 14px;cursor:pointer;}
.btn-dark{font-size:12.5px;font-weight:600;color:#fff;background:#141e1a;border:none;border-radius:9px;padding:8px 14px;cursor:pointer;}

/* cloud badge */
.cloud-badge{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:7px;}
.badge-ok{background:#e8f5ee;color:#0e8f78;}
.badge-wait{background:#fff8e0;color:#c98a1a;}
.badge-warn{background:#fdf0e8;color:#c07a3e;}

/* settings panel */
.settings-panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px;margin-bottom:14px;display:flex;gap:28px;flex-wrap:wrap;align-items:center;}
.sf{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:#33403a;}
.sf input[type=range]{width:180px;}
.swatches{display:flex;gap:8px;}
.swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.sw-on{border-color:#141e1a;}

/* filters */
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.fl{font-size:12px;color:var(--muted-2);margin-right:2px;}
.chip{font-size:12px;font-weight:600;padding:6px 13px;border-radius:20px;cursor:pointer;background:#fff;color:#33403a;border:1px solid #d8ddd6;white-space:nowrap;}
.chip-active{background:var(--accent);color:#fff;border-color:var(--accent);}
.sel-status{font-size:12px;font-weight:600;color:var(--ink);background:#fff;border:1px solid #d8ddd6;border-radius:9px;padding:6px 10px;cursor:pointer;}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:14px;}
.kpi4{grid-template-columns:repeat(4,1fr)!important;}
.kpi-card{border:1px solid var(--line);border-radius:16px;padding:17px 18px;box-shadow:0 1px 3px rgba(20,30,26,.04);}
.kpi-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.kpi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.kpi-label{font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#7c877f;line-height:1.3;}
.kpi-val{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.5px;}
.kpi-val-sm{font-size:26px;}
.kpi-sub{font-size:11.5px;color:var(--muted-2);margin-top:7px;}
.section-label{font-size:11.5px;font-weight:700;color:var(--accent);letter-spacing:.6px;text-transform:uppercase;margin:4px 0 8px 2px;}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:19px 21px;box-shadow:0 1px 3px rgba(20,30,26,.04);margin-bottom:14px;}
.card h3{margin:0 0 14px;font-size:14.5px;font-weight:700;}
.card-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.card-head.wrap-head{flex-wrap:wrap;gap:12px;}
.card-head h3{margin:0;}
.hint-sm{font-size:11px;color:var(--muted-2);}
.mb12{margin-bottom:12px;}
.legend{display:flex;gap:13px;font-size:11px;color:var(--muted);}
.legend span{display:flex;align-items:center;gap:5px;}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block;}

.row2{display:grid;gap:13px;margin-bottom:14px;}
.row-pg-status{grid-template-columns:1.35fr 1fr;}
.row-aging-pa{grid-template-columns:1fr 1.3fr;}

/* PG bars */
.pg-bars{display:flex;flex-direction:column;gap:8px;}
.pg-row{display:flex;align-items:center;gap:11px;border:none;border-radius:10px;padding:5px 8px;cursor:pointer;text-align:left;width:100%;}
.pg-lbl{width:44px;font-size:12.5px;font-weight:700;flex-shrink:0;}
.pg-track{flex:1;height:22px;background:#eef1ec;border-radius:999px;position:relative;overflow:hidden;}
.pg-fill{position:absolute;left:0;top:0;bottom:0;border-radius:999px;}
.pg-nums{font-size:12px;font-variant-numeric:tabular-nums;color:#5f6b64;width:78px;text-align:right;flex-shrink:0;}
.pg-nums b{color:var(--ink);}

/* SVG Donut */
.donut-row{display:flex;align-items:center;gap:18px;}
.donut-wrap{position:relative;flex-shrink:0;}
.donut-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-num{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:var(--green);}
.donut-cap{font-size:9px;color:var(--muted-2);margin-top:2px;}
.status-list{flex:1;display:flex;flex-direction:column;gap:9px;}
.status-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.s-tag{display:flex;align-items:center;gap:7px;font-size:12px;color:#33403a;flex:1;min-width:0;}
.dot9{width:9px;height:9px;border-radius:3px;display:inline-block;flex-shrink:0;}
.s-num{font-size:11.5px;font-variant-numeric:tabular-nums;color:#5f6b64;white-space:nowrap;}
.s-num b{color:var(--ink);}

/* Aging horizontal bars */
.aging-list{display:flex;flex-direction:column;gap:9px;}
.aging-row{display:flex;align-items:center;gap:11px;}
.aging-lbl{width:64px;font-size:11px;color:#5f6b64;flex-shrink:0;}
.aging-track{flex:1;height:20px;background:#eef1ec;border-radius:999px;position:relative;overflow:hidden;}
.aging-fill{position:absolute;left:0;top:0;bottom:0;border-radius:999px;}
.aging-num{font-size:12px;font-weight:700;color:var(--ink);width:28px;text-align:right;flex-shrink:0;}

/* Butterfly P/A chart */
.butterfly-list{display:flex;flex-direction:column;gap:12px;}
.butterfly-row{display:flex;align-items:center;gap:0;}
.b-left{flex:1;display:flex;justify-content:flex-end;}
.b-right{flex:1;display:flex;justify-content:flex-start;}
.b-bar{height:20px;border-radius:999px;min-width:3px;}
.b-pg{width:52px;text-align:center;font-size:11.5px;font-weight:700;color:#33403a;flex-shrink:0;}
.b-vals{text-align:center;font-size:9.5px;color:var(--muted-2);margin-top:4px;font-variant-numeric:tabular-nums;}

/* Monthly SVG line chart */
.month-lbl{width:46px;flex-shrink:0;font-size:10px;color:var(--muted-2);text-align:center;margin-top:4px;}

/* Yearly table */
.year-table{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1.1fr 1.1fr;font-size:12.5px;}
.yt-h{font-size:11px;color:var(--muted-2);font-weight:600;padding:0 0 9px;}
.yt-h.r{text-align:right;}
.yt-c{padding:10px 0;border-top:1px solid var(--line-soft);font-variant-numeric:tabular-nums;}
.yt-c.r{text-align:right;}
.yt-c.bold{font-weight:700;}

/* Data table (flexbox) */
.tbl-head{display:flex;gap:8px;font-size:10.5px;color:var(--muted-2);font-weight:600;padding:0 0 9px;}
.tbl-block{border-top:1px solid var(--line-soft);}
.tbl-block.tbl-exp{border-top-color:var(--accent);border-top-width:2px;}
.tbl-row{display:flex;align-items:center;gap:8px;padding:9px 0;cursor:pointer;font-size:12px;color:#33403a;}
.tbl-row:hover{background:#f8faf8;}
.mono{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#5f6b64;}
.prio-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.dot7{width:7px;height:7px;border-radius:2px;display:inline-block;flex-shrink:0;}
.s-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;}
.due-tag{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;}

.tbl-tools{display:flex;align-items:center;gap:12px;}
.tbl-hint{font-weight:400;color:var(--muted-2);font-size:12px;}
.seg{display:flex;background:#eef1ec;border-radius:9px;padding:3px;}
.seg-btn{font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:7px;border:none;cursor:pointer;background:transparent;color:#7c877f;white-space:nowrap;}
.seg-on{background:#fff;color:var(--ink);}

/* Expand panel */
.expand-panel{background:#f2f8f5;border-top:2px solid var(--accent);border-radius:0 0 12px 12px;padding:16px 18px;margin-bottom:2px;}
.expand-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:12px 16px;margin-bottom:14px;}
.ef{display:flex;flex-direction:column;gap:5px;}
.ef-span2{grid-column:span 2;}
.ef label{font-size:11px;font-weight:600;color:#7c877f;text-transform:uppercase;letter-spacing:.3px;}
.ef-sel,.ef-inp{font-family:inherit;font-size:12.5px;color:var(--ink);background:#fff;border:1px solid #d8ddd6;border-radius:8px;padding:7px 10px;width:100%;}
.ef-sel:focus,.ef-inp:focus{outline:2px solid var(--accent);border-color:var(--accent);}
.expand-btns{display:flex;gap:9px;}
.btn-save-action{font-family:inherit;font-size:12.5px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 18px;cursor:pointer;}
.btn-cancel-expand{font-family:inherit;font-size:12.5px;font-weight:600;background:#fff;color:#33403a;border:1px solid #d8ddd6;border-radius:9px;padding:8px 14px;cursor:pointer;}

@media (max-width:900px){
  .kpi-grid,.kpi4{grid-template-columns:repeat(2,1fr);}
  .row-pg-status,.row-aging-pa{grid-template-columns:1fr;}
  .upload-types{grid-template-columns:1fr;}
  .expand-grid{grid-template-columns:1fr 1fr 1fr;}
  .ef-span2{grid-column:span 1;}
}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./firebase-init.js"></script>
<script src="./app.js"></script>
</body>
</html>
